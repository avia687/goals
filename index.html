<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ascend · Goal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#05060B; --bg2:#0A0C16; --card:rgba(20,24,40,.66); --card2:rgba(28,33,54,.55);
  --line:rgba(255,255,255,.07); --txt:#EEF1FA; --mut:#8B93AD; --mut2:#565E78;
  --accent:#5B8DEF; --accent2:#A66BFF; --accent3:#22D3EE; --good:#2DD4A7; --warn:#FBBF24; --bad:#FB7185;
  --grad:linear-gradient(135deg,#22D3EE 0%,#5B8DEF 45%,#A66BFF 100%);
  --grad2:linear-gradient(135deg,#5B8DEF,#A66BFF);
  --ring:16px;
}
[data-theme="light"]{
  --bg:#EEF1F8; --bg2:#FFFFFF; --card:rgba(255,255,255,.8); --card2:rgba(247,249,253,.92);
  --line:rgba(15,20,35,.07); --txt:#10162A; --mut:#5A6480; --mut2:#98A1B8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Heebo',system-ui,sans-serif;background:var(--bg);color:var(--txt);
  overflow-x:hidden;line-height:1.5;
  background-image:radial-gradient(800px 460px at 88% -8%,rgba(166,107,255,.18),transparent 58%),
                   radial-gradient(700px 520px at -5% 105%,rgba(34,211,238,.13),transparent 55%),
                   radial-gradient(600px 400px at 50% 50%,rgba(91,141,239,.06),transparent 70%);
  background-attachment:fixed;
}
.font-d{font-family:'Sora',sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:16px 14px calc(96px + env(safe-area-inset-bottom))}
/* header */
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:38px;height:38px;border-radius:11px;background:var(--grad);display:grid;place-items:center;
  box-shadow:0 8px 24px rgba(91,141,239,.42);position:relative}
.logo svg{width:21px;height:21px}
.brand h1{font-size:19px;font-weight:800;letter-spacing:-.02em}
.brand small{display:block;color:var(--mut);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.tools{display:flex;gap:9px;align-items:center}
.icbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--card2);
  color:var(--txt);display:grid;place-items:center;cursor:pointer;transition:.2s;backdrop-filter:blur(12px)}
.icbtn:hover{border-color:var(--accent);transform:translateY(-1px)}
.icbtn svg{width:18px;height:18px}
.btn{font-family:'Heebo';border:none;border-radius:12px;padding:11px 18px;font-weight:700;font-size:14px;
  cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 8px 22px rgba(91,141,239,.4)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(166,107,255,.5)}
.btn-g{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
/* stat strip */
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sbox{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;backdrop-filter:blur(16px)}
.sbox .n{font-family:'Sora';font-size:25px;font-weight:800;letter-spacing:-.02em}
.sbox .l{color:var(--mut);font-size:12px;font-weight:500;margin-top:2px}
/* controls */
.ctrls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.search{flex:1;min-width:160px;position:relative}
.search input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:11px 40px 11px 14px;color:var(--txt);font-family:'Heebo';font-size:14px;outline:none}
.search input:focus{border-color:var(--accent)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--mut)}
select{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;
  color:var(--txt);font-family:'Heebo';font-size:14px;outline:none;cursor:pointer}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;
  backdrop-filter:blur(18px);position:relative;overflow:hidden;cursor:pointer;transition:.25s;
  animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
.card:hover{transform:translateY(-3px);border-color:rgba(91,141,239,.38);box-shadow:0 18px 40px rgba(0,0,0,.3)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card .pr-tag{position:absolute;top:16px;left:16px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.04em}
.pr-High{background:rgba(251,113,133,.16);color:var(--bad)}
.pr-Medium{background:rgba(251,191,36,.16);color:var(--warn)}
.pr-Low{background:rgba(52,211,153,.16);color:var(--good)}
.card-head{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.emoji{width:48px;height:48px;border-radius:14px;background:var(--card2);display:grid;place-items:center;font-size:24px;flex-shrink:0}
.card-head h3{font-size:17px;font-weight:700;letter-spacing:-.01em}
.card-head .cat{color:var(--mut);font-size:12px;font-weight:500;margin-top:1px}
.ring-row{display:flex;align-items:center;gap:18px;margin-bottom:16px}
.ring{position:relative;width:104px;height:104px;flex-shrink:0}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:23px}
.kv{flex:1;display:grid;gap:9px}
.kv .row{display:flex;justify-content:space-between;font-size:13px}
.kv .row .k{color:var(--mut)}.kv .row .v{font-weight:700}
.bar{height:7px;border-radius:10px;background:var(--card2);overflow:hidden;margin:4px 0 14px}
.bar i{display:block;height:100%;border-radius:10px;background:var(--grad);transition:width .8s cubic-bezier(.2,.8,.2,1)}
.foot{display:flex;justify-content:space-between;align-items:center;gap:8px;padding-top:14px;border-top:1px solid var(--line)}
.pace{font-size:12.5px;color:var(--mut)}.pace b{color:var(--txt)}
.motiv{font-size:12px;color:var(--accent);font-weight:600;margin-top:10px;display:flex;align-items:center;gap:6px}
.add-btn{font-size:13px;font-weight:700;color:#fff;background:var(--grad);border:none;border-radius:10px;padding:8px 13px;cursor:pointer;transition:.2s}
.add-btn:hover{transform:scale(1.04)}
/* empty */
.empty{text-align:center;padding:70px 20px;color:var(--mut)}
.empty .e-ic{width:78px;height:78px;border-radius:22px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;margin:0 auto 18px;font-size:36px}
.empty h2{font-family:'Sora';font-size:21px;color:var(--txt);margin-bottom:7px}
.empty p{max-width:340px;margin:0 auto 22px}
/* modal */
.ov{position:fixed;inset:0;background:rgba(4,6,12,.66);backdrop-filter:blur(8px);z-index:50;
  display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex;animation:fade .25s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border:1px solid var(--line);border-radius:26px 26px 0 0;width:100%;max-width:560px;
  max-height:92vh;overflow-y:auto;padding:24px;animation:slideup .35s cubic-bezier(.2,.85,.2,1)}
@media(min-width:640px){.ov{align-items:center}.sheet{border-radius:26px}}
@keyframes slideup{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.sheet-head h2{font-family:'Sora';font-size:20px;font-weight:800}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--mut);margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;background:var(--card2);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;color:var(--txt);font-family:'Heebo';font-size:14.5px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:62px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.emoji-pick{display:flex;gap:8px;flex-wrap:wrap}
.emoji-pick button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--card2);
  font-size:21px;cursor:pointer;transition:.15s}
.emoji-pick button.sel{border-color:var(--accent);background:rgba(91,141,239,.18);transform:scale(1.08)}
.prio-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.prio-pick button{padding:10px;border-radius:11px;border:1px solid var(--line);background:var(--card2);
  color:var(--txt);font-family:'Heebo';font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
.prio-pick button.sel{border-color:var(--accent);background:rgba(91,141,239,.16)}
/* detail */
.detail .d-top{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.detail .d-top .emoji{width:56px;height:56px;font-size:28px}
.detail .d-top h2{font-family:'Sora';font-size:22px}
.detail .d-top .cat{color:var(--mut);font-size:13px}
.bigring{display:flex;justify-content:center;margin:8px 0 18px}
.bigring .ring{width:160px;height:160px}
.bigring .pct{font-size:38px}.bigring .pct small{font-size:13px;color:var(--mut);font-weight:500;display:block}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.statgrid .s{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.statgrid .s .v{font-family:'Sora';font-size:18px;font-weight:700}
.statgrid .s .l{color:var(--mut);font-size:11px;margin-top:3px}
.predict{background:linear-gradient(135deg,rgba(34,211,238,.12),rgba(166,107,255,.12));
  border:1px solid rgba(91,141,239,.28);border-radius:16px;padding:15px 17px;margin-bottom:18px}
.predict .ai{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.predict p{font-size:14px;line-height:1.6}.predict p b{color:var(--accent2)}
.chart-tabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.chart-tabs button{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card2);
  color:var(--mut);font-family:'Heebo';font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.chart-tabs button.sel{background:var(--grad);color:#fff;border-color:transparent}
.chart-box{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:14px;height:230px;margin-bottom:18px}
.upd-row{display:flex;gap:10px;margin-bottom:18px}
.upd-row input{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--txt);font-family:'Heebo';font-size:15px;outline:none}
.upd-row input:focus{border-color:var(--accent)}
.quick-row{display:flex;gap:8px;margin:-8px 0 18px;flex-wrap:wrap}
.quick-row button{flex:1;min-width:62px;padding:9px;border-radius:11px;border:1px solid var(--line);
  background:var(--card2);color:var(--txt);font-family:'Sora';font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
.quick-row button:hover{border-color:var(--accent);background:rgba(91,141,239,.14)}
.hist h4{font-size:13px;font-weight:700;color:var(--mut);margin-bottom:11px;text-transform:uppercase;letter-spacing:.05em}
.hist-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.hist-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hist-item .ht{flex:1;font-size:14px}.hist-item .ht b{font-weight:700}
.hist-item .hd{color:var(--mut2);font-size:11.5px}
.hist-item .undo{font-size:12px;color:var(--bad);background:none;border:none;cursor:pointer;font-weight:600}
.danger{width:100%;margin-top:16px;background:rgba(251,113,133,.1);color:var(--bad);border:1px solid rgba(251,113,133,.25);
  border-radius:12px;padding:12px;font-family:'Heebo';font-weight:700;cursor:pointer}
/* milestone celebration */
.celebrate{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;pointer-events:none}
.celebrate.on{display:flex}
.celebrate .badge{text-align:center;animation:pop .6s cubic-bezier(.2,1.4,.4,1);background:var(--bg2);
  border:1px solid var(--line);border-radius:28px;padding:36px 44px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
@keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
.celebrate .big{font-size:64px;margin-bottom:8px}
.celebrate h2{font-family:'Sora';font-size:26px;margin-bottom:6px}
.celebrate p{color:var(--mut);font-size:15px}
canvas#cf{position:fixed;inset:0;z-index:79;pointer-events:none;display:none}
canvas#cf.on{display:block}
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:30}
/* streak banner */
.streak-banner{display:none;align-items:center;gap:13px;background:linear-gradient(120deg,rgba(34,211,238,.1),rgba(166,107,255,.1));
  border:1px solid rgba(91,141,239,.22);border-radius:18px;padding:14px 18px;margin-bottom:18px;animation:rise .5s both}
.streak-banner.on{display:flex}
.streak-banner .flame{font-size:30px;filter:drop-shadow(0 0 12px rgba(251,146,60,.5))}
.streak-banner .txt b{font-family:'Sora';font-size:18px}
.streak-banner .txt span{display:block;color:var(--mut);font-size:13px}
.streak-banner .nudge{margin-right:auto;font-size:13px;color:var(--warn);font-weight:600}
/* nav tabs */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-around;
  gap:4px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(10,12,22,.82);
  backdrop-filter:blur(20px) saturate(1.4);border-top:1px solid var(--line)}
[data-theme="light"] .nav{background:rgba(255,255,255,.85)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;
  background:none;color:var(--mut2);font-family:'Heebo';font-weight:600;font-size:11px;cursor:pointer;transition:.18s;border-radius:12px}
.nav-btn svg{width:24px;height:24px;transition:.18s}
.nav-btn span{transition:.18s}
.nav-btn:hover{color:var(--mut)}
.nav-btn.sel{color:var(--accent)}
.nav-btn.sel svg{transform:translateY(-1px);filter:drop-shadow(0 3px 8px rgba(91,141,239,.5))}
.nav-btn.ai-tab.sel{color:var(--accent3)}
.nav-btn.ai-tab.sel svg{filter:drop-shadow(0 3px 8px rgba(34,211,238,.5))}
.nav-add{flex:0 0 auto}
.nav-add svg{width:30px;height:30px;color:#fff;background:var(--grad2);border-radius:16px;padding:7px;
  box-shadow:0 6px 18px rgba(91,141,239,.5);box-sizing:content-box}
.nav-add:active svg{transform:scale(.92)}
.view{animation:fade .3s}
/* calendar */
.cal-wrap{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;backdrop-filter:blur(18px)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-head h3{font-family:'Sora';font-size:18px}
.cal-head button{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);cursor:pointer;font-size:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.cal-dow{text-align:center;color:var(--mut2);font-size:11px;font-weight:700;padding-bottom:4px}
.cal-cell{aspect-ratio:1;border-radius:11px;background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:var(--mut);position:relative;transition:.15s}
.cal-cell.empty{background:transparent}
.cal-cell.active{background:var(--grad2);color:#fff;box-shadow:0 4px 14px rgba(91,141,239,.4)}
.cal-cell.today{outline:2px solid var(--accent3);outline-offset:1px}
.cal-cell .mil{position:absolute;top:3px;left:5px;font-size:9px}
.cal-legend{display:flex;gap:18px;margin-top:16px;font-size:12px;color:var(--mut)}
.cal-legend i{width:12px;height:12px;border-radius:4px;display:inline-block;vertical-align:middle;margin-left:5px}
/* achievements */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.trophy{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;backdrop-filter:blur(16px);position:relative;overflow:hidden;animation:rise .5s both}
.trophy.locked{opacity:.5;filter:grayscale(.6)}
.trophy .ic{font-size:34px;margin-bottom:10px}
.trophy h4{font-family:'Sora';font-size:16px;margin-bottom:4px}
.trophy p{color:var(--mut);font-size:13px}
.trophy .when{color:var(--accent3);font-size:11.5px;font-weight:600;margin-top:8px}
.ach-section-title{font-family:'Sora';font-size:16px;font-weight:700;margin:24px 0 12px;color:var(--mut)}
.arch-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:16px;padding:14px 16px;margin-bottom:10px;backdrop-filter:blur(14px)}
.arch-card .emoji{width:46px;height:46px;border-radius:13px;background:var(--card2);display:grid;place-items:center;font-size:23px}
.arch-card .info{flex:1}.arch-card .info b{font-size:15px}.arch-card .info span{display:block;color:var(--mut);font-size:12.5px}
.arch-card .restore{font-size:12.5px;font-weight:700;color:var(--accent);background:none;border:1px solid var(--line);border-radius:10px;padding:7px 12px;cursor:pointer}
/* AI panel */
.ai-panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px;backdrop-filter:blur(18px)}
.ai-hero{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.ai-hero .orb{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#22D3EE,#A66BFF);
  display:grid;place-items:center;font-size:24px;box-shadow:0 8px 24px rgba(166,107,255,.4);animation:float 3s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-5px)}}
.ai-hero h3{font-family:'Sora';font-size:19px}.ai-hero p{color:var(--mut);font-size:13px}
.ai-actions{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
.ai-chip{padding:9px 14px;border-radius:20px;border:1px solid rgba(34,211,238,.25);background:rgba(34,211,238,.07);
  color:var(--accent3);font-family:'Heebo';font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.ai-chip:hover{background:rgba(34,211,238,.14)}
.ai-out{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:18px;min-height:90px;font-size:14.5px;line-height:1.7}
.ai-out.empty{color:var(--mut2);text-align:center;padding:40px 18px}
.ai-out b{color:var(--accent2)}
.ai-typing{display:inline-flex;gap:4px}.ai-typing i{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:blink 1.2s infinite}
.ai-typing i:nth-child(2){animation-delay:.2s}.ai-typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.ai-row{display:flex;gap:10px;margin-top:14px}
.ai-row input{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--txt);font-family:'Heebo';font-size:14px;outline:none}
.ai-row input:focus{border-color:var(--accent3)}
/* auth */
#authScreen{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
  background:var(--bg);background-image:radial-gradient(900px 500px at 85% -10%,rgba(91,141,239,.18),transparent 60%),
  radial-gradient(700px 500px at 0% 100%,rgba(155,123,255,.12),transparent 55%)}
#authScreen.on{display:flex}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:34px 30px;width:100%;max-width:400px;backdrop-filter:blur(20px);animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
.auth-card .logo{width:54px;height:54px;border-radius:16px;margin:0 auto 16px}
.auth-card .logo svg{width:28px;height:28px}
.auth-card h2{font-family:'Sora';font-size:23px;text-align:center;font-weight:800}
.auth-card .sub{text-align:center;color:var(--mut);font-size:14px;margin:6px 0 24px}
.auth-card .field input{font-size:15px}
.auth-err{background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.25);color:var(--bad);
  border-radius:11px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:none}
.auth-err.on{display:block}
.auth-switch{text-align:center;font-size:13.5px;color:var(--mut);margin-top:18px}

.user-chip{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);

.user-chip .av{width:24px;height:24px;border-radius:50%;background:var(--grad);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0}

}

  /* desktop: bottom bar becomes a centered floating pill */
  .nav{max-width:520px;margin:0 auto 16px;border-radius:20px;border:1px solid var(--line);bottom:18px;

</head>
<body>
<div id="authScreen">
  <div class="auth-card">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M4 17L9 11L13 15L20 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="6" r="2.2" fill="#fff"/></svg></div>

  </div>
</div>
<div class="wrap" id="appWrap" style="display:none">
  <div class="top">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M4 17L9 11L13 15L20 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="6" r="2.2" fill="#fff"/></svg></div>
      <div><h1 class="font-d">Ascend</h1><small>Goal Tracker</small></div>
    </div>
    <div class="tools">
      <div class="user-chip" id="userChip"><span class="av" id="userAv">·</span><span class="em" id="userEm"></span></div>
      <button class="icbtn" id="themeBtn" title="מצב כהה/בהיר"><svg id="themeIc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="icbtn" id="backupBtn" title="גיבוי היעדים"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M12 15l-4-4M12 15l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="icbtn" id="restoreBtn" title="שחזור מגיבוי"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9M12 9l-4 4M12 9l4 4M4 7V5a2 2 0 012-2h12a2 2 0 012 2v2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <input type="file" id="restoreFile" accept="application/json" style="display:none">
      <button class="icbtn" id="logoutBtn" title="התנתק"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>

  <div class="streak-banner" id="streakBanner"></div>

  <div class="strip" id="strip"></div>

  <nav class="nav" id="nav">
    <button class="nav-btn sel" data-view="dash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5M5 9.5V20a1 1 0 001 1h12a1 1 0 001-1V9.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>בית</span></button>
    <button class="nav-btn" data-view="cal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 3v3M16 3v3" stroke-linecap="round"/></svg>
      <span>לוח שנה</span></button>
    <button class="nav-btn nav-add" id="navAdd" title="יעד חדש">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></button>
    <button class="nav-btn" data-view="ach">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4h8v3a4 4 0 01-8 0V4zM6 4H4v2a3 3 0 003 3M18 4h2v2a3 3 0 01-3 3M9 14h6M10 18h4M12 11v3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>הישגים</span></button>
    <button class="nav-btn ai-tab" data-view="ai">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2 2-5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>AI</span></button>
  </nav>

  <div class="view" id="view-dash">
    <div class="ctrls">
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg><input id="srch" placeholder="חיפוש יעדים…"></div>
      <select id="sort">
        <option value="prog">לפי התקדמות</option>
        <option value="dead">לפי דדליין</option>
        <option value="new">החדשים ביותר</option>
        <option value="pct">אחוז גבוה</option>
      </select>
      <div class="sync-dot" id="syncDot"><i></i><span>מסונכרן</span></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="view" id="view-cal" style="display:none"></div>
  <div class="view" id="view-ach" style="display:none"></div>
  <div class="view" id="view-ai" style="display:none"></div>
</div>

<div class="ov" id="formOv"></div>
<div class="ov" id="detailOv"></div>
<div class="celebrate" id="cel"></div>
<canvas id="cf"></canvas>

<script>
const $=s=>document.querySelector(s);
const fmt=n=>n.toLocaleString('he-IL',{maximumFractionDigits:1});
const today=()=>new Date().toISOString().slice(0,10);
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/864e5);
const CATS={
  money:'💰 חיסכון כספי',invest:'📈 השקעה',car:'🚗 רכב',house:'🏠 דירה',travel:'✈️ טיול',
  edu:'🎓 לימודים',wedding:'💍 חתונה',emergency:'🚨 קרן חירום',
  weightloss:'⚖️ ירידה במשקל',weightgain:'📊 עלייה במשקל',bodyfat:'🔥 אחוז שומן',waist:'📏 היקף מותניים',
  muscle:'💪 מסת שריר',run:'🏃 ריצה',workout:'🏋️ אימונים',steps:'👟 צעדים',
  income:'💵 הכנסה',networth:'🏦 הון',read:'📚 קריאה',meditate:'🧘 מדיטציה',water:'💧 מים',
  study:'⌨️ לימוד',custom:'📦 מותאם'
};
const EMOJIS=['💰','📈','🚗','🏠','✈️','🎓','💍','🚨','⚖️','💪','🏃','🔥','👟','💵','🏦','📚','🧘','💧','⌨️','🎯','📦','🚀'];
const CAT_UNIT={weightloss:'ק״ג',weightgain:'ק״ג',bodyfat:'%',waist:'ס״מ',muscle:'ק״ג',run:'ק״מ',workout:'אימונים',steps:'צעדים',water:'ליטר',read:'ספרים',meditate:'דקות',study:'שעות',money:'₪',invest:'₪',car:'₪',house:'₪',travel:'₪',edu:'₪',wedding:'₪',emergency:'₪',income:'₪',networth:'₪'};
const CAT_EMOJI={weightloss:'⚖️',weightgain:'📊',bodyfat:'🔥',waist:'📏',muscle:'💪',run:'🏃',workout:'🏋️',steps:'👟',water:'💧',read:'📚',meditate:'🧘',study:'⌨️',money:'💰',invest:'📈',car:'🚗',house:'🏠',travel:'✈️',edu:'🎓',wedding:'💍',emergency:'🚨',income:'💵',networth:'🏦',custom:'📦'};
const MOTIV=['כל צעד נחשב.','אתה קרוב יותר מאתמול.','תמשיך כך, זה עובד.','המשמעת בונה תוצאות.','עוד קצת — אתה בדרך.'];

let goals=[];
let archived=[];
let currentView='dash';
let editId=null,curId=null,chart=null,chartType='line';
let user=null, signupMode=false, saveTimer=null;

/* ===== local auth (saved in this browser) ===== */
function uKey(name){return 'ascend_user_'+name.toLowerCase()}
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return String(h)}

function authErr(msg){const e=$('#authErr');if(msg){e.textContent=msg;e.classList.add('on')}else e.classList.remove('on')}

function boot(){
  // adjust labels for username instead of email
  const lbls=document.querySelectorAll('#authScreen .field label');
  if(lbls[0])lbls[0].textContent='שם משתמש';
  const em=$('#au_email');if(em){em.type='text';em.placeholder='בחר שם משתמש';em.autocomplete='username'}
  $('#authSub').textContent='היכנס או הירשם — הנתונים נשמרים בדפדפן הזה';
  const last=localStorage.getItem('ascend_last_user');
  if(last&&localStorage.getItem(uKey(last))){onLogin(last)}
  else{$('#authScreen').classList.add('on')}
}

function doAuth(){
  authErr('');
  const name=$('#au_email').value.trim(), pass=$('#au_pass').value;
  if(!name||pass.length<4){authErr('הזן שם משתמש וסיסמה (לפחות 4 תווים).');return}
  const rec=localStorage.getItem(uKey(name));
  if(signupMode){
    if(rec){authErr('שם המשתמש כבר תפוס — בחר אחר או התחבר.');return}
    localStorage.setItem(uKey(name),JSON.stringify({pass:hash(pass),data:{goals:[],archived:[]}}));
    onLogin(name);
  }else{
    if(!rec){authErr('המשתמש לא קיים — הירשם קודם.');return}
    const obj=JSON.parse(rec);
    if(obj.pass!==hash(pass)){authErr('סיסמה שגויה.');return}
    onLogin(name);
  }
}

function onLogin(name){
  user=name;
  localStorage.setItem('ascend_last_user',name);
  $('#authScreen').classList.remove('on');
  $('#appWrap').style.display='';
  $('#userEm').textContent=name;
  $('#userAv').textContent=(name[0]||'·').toUpperCase();
  loadLocal();
}

function logout(){
  user=null;goals=[];archived=[];
  localStorage.removeItem('ascend_last_user');
  $('#appWrap').style.display='none';
  $('#authScreen').classList.add('on');
  $('#au_pass').value='';
}

/* ===== local data ===== */
function loadLocal(){
  syncState('saving');
  const rec=localStorage.getItem(uKey(user));
  if(rec){const d=JSON.parse(rec).data||{};goals=d.goals||[];archived=d.archived||[]}
  else{goals=[];archived=[]}
  syncState('ok');render();
}
function save(){
  syncState('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushLocal,200);
}
function pushLocal(){
  if(!user){syncState('ok');return}
  try{
    const rec=JSON.parse(localStorage.getItem(uKey(user))||'{}');
    rec.data={goals,archived};
    localStorage.setItem(uKey(user),JSON.stringify(rec));
    syncState('ok');
  }catch(err){console.warn(err);syncState('err')}
}
function syncState(s){
  const d=$('#syncDot');if(!d)return;
  d.classList.toggle('saving',s==='saving');
  d.querySelector('span').textContent=s==='saving'?'שומר…':s==='err'?'שגיאת שמירה':'נשמר';
  d.querySelector('i').style.background=s==='err'?'var(--bad)':s==='saving'?'var(--warn)':'var(--good)';
}

/* ===== stats ===== */
function stat(g){
  const start=Math.min(g.start??g.current,0);
  const span=g.target-(g.startVal??0);
  const done=g.current-(g.startVal??0);
  let pct=span!==0?Math.max(0,Math.min(100,(done/span)*100)):0;
  if(g.target<(g.startVal??0)){ // descending goal (weight loss)
    const tot=(g.startVal)-g.target, prog=(g.startVal)-g.current;
    pct=tot!==0?Math.max(0,Math.min(100,(prog/tot)*100)):0;
  }
  const remaining=Math.abs(g.target-g.current);
  const dRem=Math.max(0,daysBetween(today(),g.targetDate));
  const dElapsed=Math.max(1,daysBetween(g.startDate,today()));
  const perDay=Math.abs(g.current-(g.startVal??0))/dElapsed;
  const needPerDay=dRem>0?remaining/dRem:remaining;
  const eta=perDay>0?new Date(Date.now()+(remaining/perDay)*864e5).toISOString().slice(0,10):null;
  const onTrack=eta&&new Date(eta)<=new Date(g.targetDate);
  return{pct:Math.round(pct),remaining,dRem,perDay,needPerDay,eta,onTrack,dElapsed};
}
function streak(g){
  if(!g.history?.length)return 0;
  const days=[...new Set(g.history.map(h=>h.date))].sort().reverse();
  let s=0,d=new Date(today());
  for(const day of days){
    if(daysBetween(day,d.toISOString().slice(0,10))<=1){s++;d=new Date(day)}else break;
  }
  return s;
}
function globalStreak(){
  const all=[...goals,...archived];
  const days=[...new Set(all.flatMap(g=>(g.history||[]).map(h=>h.date)))].sort().reverse();
  if(!days.length)return 0;
  let s=0,d=new Date(today());
  for(const day of days){
    if(daysBetween(day,d.toISOString().slice(0,10))<=1){if(day!==d.toISOString().slice(0,10)||s===0)s++;d=new Date(day)}else break;
  }
  // simpler robust count of consecutive days ending today/yesterday
  let count=0,cursor=new Date(today());
  const set=new Set(days);
  if(!set.has(today())&&!set.has(new Date(Date.now()-864e5).toISOString().slice(0,10)))return 0;
  if(!set.has(today()))cursor=new Date(Date.now()-864e5);
  while(set.has(cursor.toISOString().slice(0,10))){count++;cursor=new Date(cursor-864e5)}
  return count;
}
function activeDays(){ // set of YYYY-MM-DD with any update (active+archived)
  return new Set([...goals,...archived].flatMap(g=>(g.history||[]).map(h=>h.date)));
}
function milestoneDays(){
  const m={};
  [...goals,...archived].forEach(g=>(g.history||[]).forEach(h=>{ if(h.milestone)m[h.date]=h.milestone }));
  return m;
}

/* ===== render ===== */
function ring(pct,size,id){
  const r=size/2-7,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}"><defs><linearGradient id="g${id}" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#22D3EE"/><stop offset=".5" stop-color="#5B8DEF"/><stop offset="1" stop-color="#A66BFF"/></linearGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--card2)" stroke-width="9"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#g${id})" stroke-width="9"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"/></svg>
    <div class="pct">${pct}%</div></div>`;
}
function renderStrip(){
  const total=goals.length;
  const done=goals.filter(g=>stat(g).pct>=100).length+archived.length;
  const avg=total?Math.round(goals.reduce((s,g)=>s+stat(g).pct,0)/total):0;
  const gs=globalStreak();
  $('#strip').innerHTML=[
    [total,'יעדים פעילים'],[done,'הושלמו'],[avg+'%','התקדמות ממוצעת'],[gs+' 🔥','רצף נוכחי']
  ].map(([n,l])=>`<div class="sbox"><div class="n font-d">${n}</div><div class="l">${l}</div></div>`).join('');
}
function renderGrid(){
  let list=[...goals];
  const q=$('#srch').value.trim().toLowerCase();
  if(q)list=list.filter(g=>g.name.toLowerCase().includes(q)||(CATS[g.cat]||'').includes(q));
  const sort=$('#sort').value;
  list.sort((a,b)=>{
    if(sort==='prog')return stat(b).pct-stat(a).pct;
    if(sort==='pct')return stat(b).pct-stat(a).pct;
    if(sort==='dead')return new Date(a.targetDate)-new Date(b.targetDate);
    return b.id-a.id;
  });
  if(!goals.length){
    $('#grid').innerHTML=`<div class="empty" style="grid-column:1/-1">
      <div class="e-ic">🎯</div><h2>עדיין אין יעדים</h2>
      <p>הגדר יעד מדיד ראשון — חיסכון, כושר, או הרגל — וצפה בהתקדמות עד 100%.</p>
      <button class="btn btn-p" onclick="openForm()">צור יעד ראשון</button></div>`;
    return;
  }
  $('#grid').innerHTML=list.map((g,i)=>{
    const s=stat(g);const m=MOTIV[g.id%MOTIV.length];
    return `<div class="card" style="animation-delay:${i*.05}s" onclick="openDetail(${g.id})">
      <div class="pr-tag pr-${g.priority}">${({High:'עדיפות גבוהה',Medium:'בינונית',Low:'נמוכה'})[g.priority]}</div>
      <div class="card-head">
        <div class="emoji">${g.emoji}</div>
        <div><h3>${g.name}</h3><div class="cat">${CATS[g.cat]||g.cat}</div></div>
      </div>
      <div class="ring-row">${ring(s.pct,104,'c'+g.id)}
        <div class="kv">
          <div class="row"><span class="k">נוכחי</span><span class="v">${fmt(g.current)} ${g.unit}</span></div>
          <div class="row"><span class="k">יעד</span><span class="v">${fmt(g.target)} ${g.unit}</span></div>
          <div class="row"><span class="k">נותר</span><span class="v">${fmt(s.remaining)} ${g.unit}</span></div>
        </div></div>
      <div class="bar"><i style="width:${s.pct}%"></i></div>
      <div class="motiv">✦ ${m}</div>
      <div class="foot">
        <div class="pace">בקצב הנוכחי: <b>${s.dRem} ימים</b> · יעד/יום <b>${fmt(s.needPerDay)}</b></div>
        <button class="add-btn" onclick="event.stopPropagation();quickAdd(${g.id})">+ עדכן</button>
      </div></div>`;

function prediction(g,s){
  if(s.pct>=100)return `🎉 <b>היעד הושלם!</b> סיימת את כל המסלול. זמן להגדיר אתגר חדש.`;

  const etaTxt=new Date(s.eta).toLocaleDateString('he-IL');

  const extra=fmt(s.needPerDay-s.perDay);
  return `אתה מעט מאחור. אם תוסיף <b>${extra} ${g.unit} ביום</b> תסגור את הפער בזמן. תחזית נוכחית: <b>${etaTxt}</b>.`;

      <div class="hd">${new Date(x.date).toLocaleDateString('he-IL')}</div>
      ${i===0&&h.length>1?`<button class="undo" onclick="undo(${g.id})">בטל</button>`:''}</div>`;
  }).join(''):'<p style="color:var(--mut);font-size:13px">אין עדכונים עדיין.</p>';

function applyUpdate(id){
  const v=parseFloat($('#upd_in').value);if(isNaN(v))return;
  const g=goals.find(x=>x.id===id);const prev=g.current;
  g.history=g.history||[];g.history.push({date:today(),delta:v-prev,value:v,ts:Date.now()});

function undo(id){const g=goals.find(x=>x.id===id);if(g.history.length<2)return;
  g.history.pop();g.current=g.history[g.history.length-1].value;render();openDetail(id)}
function delGoal(id){if(!confirm('למחוק את היעד לצמיתות?'))return;goals=goals.filter(x=>x.id!==id);closeOv('detailOv');render()}

/* ===== chart ===== */
function drawChart(g){
  const cv=$('#chart');if(!cv)return;if(chart)chart.destroy();
  const css=getComputedStyle(document.body);
  const grid=css.getPropertyValue('--line'),mut=css.getPropertyValue('--mut');
  let raw=(g.history||[]).map(h=>({d:h.date,v:h.value}));
  if(raw.length<2)raw.unshift({d:g.startDate,v:g.startVal??0});
  const labels=raw.map(r=>new Date(r.d).toLocaleDateString('he-IL',{day:'numeric',month:'numeric'}));
  const vals=raw.map(r=>r.v);
  const ctx=cv.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(91,141,239,.38)');grad.addColorStop(1,'rgba(91,141,239,0)');
  chart=new Chart(ctx,{
    type:chartType==='bar'?'bar':'line',
    data:{labels,datasets:[{label:g.unit,data:vals,borderColor:'#5B8DEF',backgroundColor:chartType==='area'?grad:(chartType==='bar'?'#5B8DEF':'transparent'),
      fill:chartType==='area',tension:.35,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#A66BFF',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:mut,maxTicksLimit:6,font:{size:10}},grid:{color:grid}},
      y:{ticks:{color:mut,font:{size:10}},grid:{color:grid},
        suggestedMax:Math.max(g.target,g.startVal||0)*1.05}}}
  });
}

/* ===== milestones + confetti ===== */
function checkMilestone(g){
  const pct=stat(g).pct;g.milestones=g.milestones||[];
  for(const m of [10,25,50,75,90,100]){
    if(pct>=m&&!g.milestones.includes(m)){
      g.milestones.push(m);
      if(g.history?.length)g.history[g.history.length-1].milestone=m;
      celebrate(m,g);break;
    }
  }
}
function celebrate(m,g){
  const msgs={10:'ההתחלה הכי קשה — ועברת אותה.',25:'רבע הדרך מאחוריך!',50:'חצי דרך! המומנטום איתך.',
    75:'שלושת רבעי — היעד באופק.',90:'כמעט שם. עוד מאמץ אחרון.',100:'השלמת את היעד! 🏆'};
  $('#cel').innerHTML=`<div class="badge"><div class="big">${m===100?'🏆':'🎉'}</div>
    <h2>${m}% ${m===100?'הושלם!':''}</h2><p>${msgs[m]}</p></div>`;
  $('#cel').classList.add('on');confetti();
  setTimeout(()=>$('#cel').classList.remove('on'),2600);save();
}
function confetti(){
  const cv=$('#cf');cv.classList.add('on');cv.width=innerWidth;cv.height=innerHeight;
  const ctx=cv.getContext('2d');const cols=['#22D3EE','#5B8DEF','#A66BFF','#2DD4A7','#FBBF24','#FB7185'];
  const ps=Array.from({length:140},()=>({x:Math.random()*cv.width,y:-20-Math.random()*200,
    r:4+Math.random()*6,c:cols[Math.random()*cols.length|0],vy:2+Math.random()*4,vx:-2+Math.random()*4,
    rot:Math.random()*6,vr:-.2+Math.random()*.4}));
  let t=0;(function anim(){t++;ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);ctx.restore()});
    if(t<160)requestAnimationFrame(anim);else cv.classList.remove('on')})();
}

$('#au_email').addEventListener('keydown',e=>{if(e.key==='Enter')$('#au_pass').focus()});

  signupMode=!signupMode;authErr('');
  $('#authTitle').textContent=signupMode?'הרשמה':'התחברות';
  $('#authSub').textContent=signupMode?'צור חשבון כדי לשמור ולסנכרן את היעדים שלך':'היכנס כדי לסנכרן את היעדים שלך בכל המכשירים';
  $('#authBtn').textContent=signupMode?'הרשמה':'התחבר';

  $('#switchMode').onclick=switchAuthMode;
}
$('#switchMode').onclick=switchAuthMode;

/* ===== backup / restore ===== */
function backupData(){
  const payload={app:'ascend',version:1,user,exportedAt:new Date().toISOString(),goals,archived};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`ascend-backup-${user||'goals'}-${today()}.json`;
  document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
}
$('#backupBtn').onclick=backupData;
$('#restoreBtn').onclick=()=>$('#restoreFile').click();
$('#restoreFile').onchange=e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(obj.app!=='ascend'||!Array.isArray(obj.goals))throw new Error('bad');
      if(!confirm('שחזור יחליף את כל היעדים הנוכחיים שלך. להמשיך?'))return;
      goals=obj.goals;archived=obj.archived||[];
      render();switchView('dash');
      alert('היעדים שוחזרו בהצלחה ✓');
    }catch(err){alert('הקובץ אינו גיבוי תקין של Ascend.')}
    e.target.value='';
  };
  reader.readAsText(file);
};

boot();
</script>
